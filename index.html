<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Partner Peludo - Acceso</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="images/logo.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <script src="PetShopApi/script/index.js" defer></script>

    <style>
        body {
            background-color: #f8f9fa; /* Fondo gris muy suave */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Centrado perfecto vertical y horizontal */
        .vh-centrado {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Estilo minimalista de medalla para la tarjeta */
        .card-premium {
            border: 2px solid #000;
            border-radius: 0; /* Minimalista cuadrado */
            background-color: #fff;
            max-width: 420px;
            width: 100%;
        }

        /* SVG del Logo: Adaptable y Premium */
        .logo-medalla-svg {
            max-width: 180px; /* Tamaño máximo en desktop */
            width: 100%;
            height: auto;
            transition: all 0.5s ease;
        }

        /* Ajuste responsivo para celulares */
        @media (max-width: 576px) {
            .logo-medalla-svg {
                max-width: 130px;
            }
            .card-premium {
                padding: 1.5rem !important;
            }
        }
    </style>
</head>
<body>

    <div class="container vh-centrado p-3">
        <div class="card card-premium p-4 p-md-5 shadow-lg text-center">
            
            <div class="mb-4">
                <img src="images/logo.png" alt="Logo Tu Partner Peludo" id="main-logo" class="logo-medalla-img">
                <h1 class="visually-hidden">Tu Partner Peludo</h1> </div>

            <div id="login-section">
                <p class="text-muted mb-4">Ingresa para ver tus pedidos personalizados</p>
                
                <form id="formLogin" class="mb-3">
                    <div class="input-group mb-3">
                        <span class="input-group-text"><i class="fa-regular fa-envelope text-muted"></i></span>
                        <input type="email" id="loginEmail" class="form-control form-control-premium with-icon" placeholder="Correo electrónico" required placeholder="correo@ejemplo.com">
                    </div>

                    <div class="input-group mb-3">
                        <span class="input-group-text"><i class="fa-solid fa-lock text-muted"></i></span>
                        <input type="password" id="loginPass" class="form-control form-control-premium with-icon" placeholder="Contraseña" required placeholder="Tu contraseña">
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-dark fw-bold border-0" style="background: #836f14;">ENTRAR</button>
                    </div>
                </form>

                <div class="d-flex align-items-center mb-3">
                    <hr class="flex-grow-1 border-secondary opacity-25">
                    <span class="mx-2 small text-muted">O</span>
                    <hr class="flex-grow-1 border-secondary opacity-25">
                </div>

                <div id="buttonDiv" class="d-flex justify-content-center mb-4"></div>
                
                <p class="small text-muted mb-0">¿Eres nuevo? 
                    <a href="javascript:void(0)" onclick="mostrarRegistro()" class="text-dark fw-bold text-decoration-none border-bottom border-dark">Regístrate aquí</a>
                </p>
            </div>

            <div id="register-section" class="d-none">
                <h4 class="fw-bold mb-3">Crea tu cuenta</h4>
                <form id="formRegistro" onsubmit="procesarRegistro(event)">
                    <div class="mb-3 text-start">
                        <label class="form-label small fw-bold">Nombre</label>
                        <input type="text" id="reg-nombre" class="form-control" required placeholder="Ej: Jose">
                    </div>
                    <div class="mb-3 text-start">
                        <label class="form-label small fw-bold">Apellido</label>
                        <input type="text" id="reg-apellido" class="form-control" required placeholder="Ej: Perez">
                    </div>
                    <div class="mb-3 text-start">
                        <label class="form-label small fw-bold">Correo Electrónico</label>
                        <input type="email" id="reg-email" class="form-control" required placeholder="correo@ejemplo.com">
                    </div>
                    <div class="mb-3 text-start">
                        <label class="form-label small fw-bold">Contraseña</label>
                        <input type="password" id="reg-password" class="form-control" required placeholder="Crea tu contraseña (Mínimo 6 caracteres)">
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-dark fw-bold border-0" style="background: #000;">REGISTRARME</button>
                        <button type="button" onclick="mostrarLogin()" class="btn btn-link text-muted btn-sm">Volver al inicio</button>
                    </div>
                </form>
            </div>
            <div id="user-profile" class="d-none">
                <div class="mb-3">
                    <img id="user-img" src="" class="rounded-circle border border-dark" style="width: 80px; height: 80px; object-fit: cover;">
                </div>
                <h4 id="user-name" class="fw-bold mb-1"></h4>
                <p class="text-muted mb-4 small">¡Listo para consentir a tu mascota!</p>
                
                <div class="d-grid gap-2 col-10 mx-auto">
                    <button onclick="irAlMain()" class="btn btn-dark fw-bold border-0 p-3" style="background: #000; border-radius: 0;">IR A LA TIENDA</button>
                    <button onclick="cerrarSesion()" class="btn btn-link text-danger btn-sm fw-bold">Cerrar Sesión</button>
                </div>
            </div>

        </div>
    </div>
    <script src="PetShopApi/script/index.js"></script>
</body>
</html>
