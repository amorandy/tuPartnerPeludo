<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Partner Peludo - Acceso</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        body {
            background-color: #f8f9fa; /* Fondo gris muy suave */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Centrado perfecto vertical y horizontal */
        .vh-centrado {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Estilo minimalista de medalla para la tarjeta */
        .card-premium {
            border: 2px solid #000;
            border-radius: 0; /* Minimalista cuadrado */
            background-color: #fff;
            max-width: 420px;
            width: 100%;
        }

        /* SVG del Logo: Adaptable y Premium */
        .logo-medalla-svg {
            max-width: 180px; /* Tamaño máximo en desktop */
            width: 100%;
            height: auto;
            transition: all 0.5s ease;
        }

        /* Ajuste responsivo para celulares */
        @media (max-width: 576px) {
            .logo-medalla-svg {
                max-width: 130px;
            }
            .card-premium {
                padding: 1.5rem !important;
            }
        }
    </style>
</head>
<body>

    <div class="container vh-centrado p-3">
        <div class="card card-premium p-4 p-md-5 shadow-lg text-center">
            
            <div class="mb-4">
                <img src="images/logo.png" alt="Logo Tu Partner Peludo" id="main-logo" class="logo-medalla-img">
                <h1 class="visually-hidden">Tu Partner Peludo</h1> </div>

            <div id="login-section">
                <p class="text-muted mb-4 px-3">Ingresa para ver tus pedidos personalizados</p>
                <div id="buttonDiv" class="d-flex justify-content-center mb-3"></div>
                
                <hr class="border-dark opacity-25">
                
                <p class="small text-muted">¿Eres nuevo? 
                    <a href="#" class="text-dark fw-bold">Regístrate aquí</a>
                </p>
            </div>

            <div id="user-profile" class="d-none">
                <div class="mb-3">
                    <img id="user-img" src="" class="rounded-circle border border-dark" style="width: 80px; height: 80px; object-fit: cover;">
                </div>
                <h4 id="user-name" class="fw-bold mb-1"></h4>
                <p class="text-muted mb-4 small">¡Listo para consentir a tu mascota!</p>
                
                <div class="d-grid gap-2 col-10 mx-auto">
                    <button onclick="irAlMain()" class="btn btn-dark fw-bold border-0 p-3" style="background: #000; border-radius: 0;">IR A LA TIENDA</button>
                    <button onclick="cerrarSesion()" class="btn btn-link text-danger btn-sm fw-bold">Cerrar Sesión</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        function decodeJwtResponse(token) {
            let base64Url = token.split('.')[1];
            let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            let jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        function handleCredentialResponse(response) {
            const responsePayload = decodeJwtResponse(response.credential);
            localStorage.setItem('google_token', response.credential);

            // Cambios Visuales Responsivos
            document.getElementById("login-section").classList.add("d-none");
            document.getElementById("user-profile").classList.remove("d-none");

            // Llenado de datos
            document.getElementById("user-name").innerText = responsePayload.name.toUpperCase();
            document.getElementById("user-img").src = responsePayload.picture;
            
            // El logo se hace más pequeño para dar espacio al perfil
            const logo = document.getElementById("main-logo");
            logo.style.maxWidth = "80px";
        }

        window.onload = function () {
            // Verificar si ya hay token (redirigir al Master Page si ya está logueado)
            if (localStorage.getItem('google_token')) {
                // window.location.href = "main.html"; // Activar en producción
            }

            google.accounts.id.initialize({
                client_id: "85108018661-r3dis4gm7h25kg9or2fnnpckhme87raj.apps.googleusercontent.com",
                callback: handleCredentialResponse
            });

            google.accounts.id.renderButton(
                document.getElementById("buttonDiv"),
                { theme: "outline", size: "large", width: "350", text: "signin_with", shape: "rectangular" }
            );
        }

        function irAlMain() { window.location.href = "main.html"; }
        function cerrarSesion() { localStorage.removeItem('google_token'); location.reload(); }
    </script>
</body>
</html>
