<!DOCTYPE html>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="CSS/main.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-white p-3 border-bottom">

            <a class="navbar-brand d-flex align-items-center fw-bold" href="#">

            </a>

            <div class="d-flex align-items-center">

                    <small id="user-email" class="text-muted" style="font-size: 0.75rem;"></small>

                <img id="user-img" src="" class="rounded-circle user-avatar border" width="40" height="40">

                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </nav>
    <div class="container-fluid">
        <div class="row">
            <aside class="col-md-2 bg-white p-3 border-end" style="min-height: 80vh;">
                <h5 class="fw-bold mb-4">Categorías</h5>
                <ul class="nav flex-column">
                    <li class="nav-item mb-2"><a href="#" class="nav-link text-dark active" onclick="filtrarProductos('todos')">Todos</a></li>
                    <li class="nav-item mb-2"><a href="#" class="nav-link text-dark" onclick="filtrarProductos('placas')">Placas</a></li>

                </ul>

                <li class="nav-item w-100">
                    <a href="admin-productos.html" id="btn-admin" class="nav-link text-danger d-none">

                    </a>
                </li>
            </aside>
            <main class="col-md-10 p-4">
                <h2 class="mb-4">Productos Destacados</h2>
                <div class="row" id="contenedor-productos">
                </div>
            
            </main>
        </div>
    </div>
