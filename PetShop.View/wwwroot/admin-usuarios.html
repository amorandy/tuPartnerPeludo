<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Partner Peludo - Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="icon" type="image/png" href="images/logo.png">
    <script src="script/master.js" defer></script>
    <link rel="stylesheet" href="css/admin-productos.css">
</head>
<body class="bg-light">

    <div id="layout-navbar"></div>

    <div class="container-fluid">
        <div class="row">
            <div id="layout-sidebar" class="col-md-2 p-0"></div>

            <main id="main-content" class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3>Gestión de Usuarios</h3>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <input type="text" id="id="inputBusqueda" class="form-control"
                               placeholder="🔍 Buscar por nombre o email..."
                               onkeyup="filtrarUsuarios(event)">
                    </div>
                </div>

                <div class="card shadow-sm p-4">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Nombre</th>
                                    <th>Email</th>
                                    <th>Rol</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="lista-usuarios">
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script src="script/config.js"></script>
    <script src="script/master.js" defer></script>
    <script src="script/auth-utils.js"></script>
    <script src="script/admin-usuarios.js"></script>
</body>
</html>
