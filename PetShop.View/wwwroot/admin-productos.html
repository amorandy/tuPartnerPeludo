<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Partner Peludo - Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="css/admin-productos.css">
</head>
<body class="bg-light">
    <div id="layout-navbar"></div>
    <div class="container-fluid">
        <div class="row">
            <div id="layout-sidebar" class="col-md-2 p-0"></div>
            <main id="main-content" class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3>Inventario</h3>
                    <button class="btn btn-primary" onclick="toggleFormulario()">
                        <i class="fa fa-plus-circle"></i> Agregar Producto
                    </button>
                </div>
                <div id="contenedor-formulario" class="collapse mb-4">
                    <div class="card shadow-sm border-0 mb-4">
                        <div class="card-body p-4">
                            <h4 class="mb-4">Agregar Nuevo Producto</h4>
                            <form id="form-producto">
                                <input type="hidden" id="productoId">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Nombre</label>
                                        <input type="text" id="nombre" class="form-control" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Precio</label>
                                        <input type="number" id="precio" class="form-control" required>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Descripción</label>
                                    <textarea id="descripcion" class="form-control" rows="2"></textarea>
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Stock</label>
                                        <input type="number" id="stock" class="form-control" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Seleccionar Imagen</label>
                                        <input type="file" id="imagenProducto" class="form-control" accept="image/*">
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 mt-2">Guardar Producto</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="card shadow-sm p-4">
                    <h4 class="mb-3">Productos Existentes</h4>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle" id="tabla-productos">
                            <thead class="table-light">
                                <tr>
                                    <th>Imagen</th>
                                    <th>Nombre</th>
                                    <th>Descripción</th>
                                    <th>Precio</th>
                                    <th>Stock</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="lista-productos"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script src="script/config.js"></script>
    <script src="script/master.js" defer></script>
    <script src="script/auth-utils.js"></script>
    <script src="script/admin-productos.js"></script>
    <script>
        async function initApp() {
            await Promise.all([
                fetch('components/navbar.html').then(r => r.text()).then(html => document.getElementById('layout-navbar').innerHTML = html),
                fetch('components/sidebar.html').then(r => r.text()).then(html => document.getElementById('layout-sidebar').innerHTML = html)
            ]);

            if (typeof renderizarTablaProductos === 'function') {
                renderizarTablaProductos();
            }
        }
        initApp();
    </script>
</body>
</html>
